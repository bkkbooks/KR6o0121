front:
  text: 大乘起信論略述序沙門澄漪述至覺潛輝異學峯起不有甄述正法斯訛故大士馬鳴發揮真諦括眾論綰群經破二邊協中道作此正論以獎將來福潤河沙聲流法界張皇教義融會真筌為學人之宗源作道者之龜鏡故先賢碩德開釋巨多廣略之體互殊是非之途或異臨文俯義得失交并有建康沙門曇曠者幼而好學長而成德妙閑製述善清詞先造廣釋後學賴焉包含事理網羅邪正無執而不改有疑而不皆遣恐初心者仰崇崖而起退望渤海而迷神廼復探其旨歸為之略述可謂尋其源而知其流折其檊而得其枝至如開發題端該談教藏傍探異說委闢義門引經證成會論宗趣法喻周舉問答折疑略而不明具如廣釋好博聞者尋而究之且欲指陳綰攝綱要澄漪不才喜承餘論揚攉深旨以示方來冀法鏡高懸真風不墜耳
